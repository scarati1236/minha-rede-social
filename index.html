<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scaratigram - Sua Rede Social de Texto</title>
    <style>
        :root {
            --primary-color: #000000;
            --bg-color: #ffffff;
            --card-bg: #f8f9fa;
            --text-main: #111111;
            --text-secondary: #555555;
            --border-color: #eeeeee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Navbar */
        nav {
            background-color: var(--bg-color);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .user-nav {
            font-weight: bold;
        }

        /* Main Content */
        .container {
            max-width: 650px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Post Box */
        .post-box {
            background: var(--card-bg);
            border: 1px solid var(--primary-color);
            padding: 20px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            background: #ffffff;
            padding: 15px;
            resize: none;
            outline: none;
            font-size: 16px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .post-box-footer {
            display: flex;
            justify-content: flex-end;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #333;
        }

        /* Feed Posts */
        .post {
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 20px;
        }

        .post-header {
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        .post-user-name {
            font-weight: bold;
            display: block;
        }

        .post-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .post-content {
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 18px;
        }

        .post-actions {
            display: flex;
            gap: 25px;
        }

        .action-btn {
            color: var(--text-main);
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-decoration: underline;
        }

        .action-btn.liked {
            color: #ff0000;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                margin: 15px auto;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">Scaratigram</a>
        <div class="user-nav">
            [ PERFIL ]
        </div>
    </nav>

    <div class="container">
        <!-- Post Composer -->
        <div class="post-box">
            <textarea id="postInput" placeholder="ESCREVA SUA MENSAGEM..." rows="3"></textarea>
            <div class="post-box-footer">
                <button id="btnPost">PUBLICAR TEXTO</button>
            </div>
        </div>

        <!-- Feed -->
        <div id="feed">
            <!-- Posts de texto aparecerão aqui -->
        </div>
    </div>

    <script>
        const postInput = document.getElementById('postInput');
        const btnPost = document.getElementById('btnPost');
        const feed = document.getElementById('feed');

        // Dados Iniciais (Apenas Texto)
        let posts = [
            {
                id: 1,
                user: 'JOÃO SILVA',
                content: 'ESTA É UMA REDE SOCIAL EXCLUSIVA PARA TEXTOS. SEM DISTRAÇÕES VISUAIS, APENAS IDEIAS.',
                time: '2 HORAS ATRÁS',
                likes: 5,
                liked: false
            },
            {
                id: 2,
                user: 'MARIA SANTOS',
                content: 'A PUREZA DO TEXTO PERMITE UMA COMUNICAÇÃO MAIS DIRETA E PROFUNDA.',
                time: '5 HORAS ATRÁS',
                likes: 12,
                liked: true
            }
        ];

        function renderPosts() {
            feed.innerHTML = '';
            posts.forEach(post => {
                const postElement = document.createElement('div');
                postElement.className = 'post';
                postElement.innerHTML = `
                    <div class="post-header">
                        <span class="post-user-name">AUTOR: ${post.user}</span>
                        <span class="post-time">POSTADO EM: ${post.time}</span>
                    </div>
                    <div class="post-content">
                        ${post.content}
                    </div>
                    <div class="post-actions">
                        <span class="action-btn ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            ${post.liked ? '[ CURTIDO ]' : '[ CURTIR ]'} (${post.likes})
                        </span>
                        <span class="action-btn">
                            [ COMENTAR ]
                        </span>
                    </div>
                `;
                feed.appendChild(postElement);
            });
        }

        function toggleLike(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                if (post.liked) {
                    post.likes--;
                    post.liked = false;
                } else {
                    post.likes++;
                    post.liked = true;
                }
                renderPosts();
            }
        }

        btnPost.addEventListener('click', () => {
            const content = postInput.value.trim();
            if (content) {
                const newPost = {
                    id: Date.now(),
                    user: 'VOCÊ',
                    content: content.toUpperCase(),
                    time: 'AGORA MESMO',
                    likes: 0,
                    liked: false
                };
                posts.unshift(newPost);
                postInput.value = '';
                renderPosts();
            }
        });

        // Renderização Inicial
        renderPosts();
    </script>
</body>
</html>
